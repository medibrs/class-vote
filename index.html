<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vote for your classmates in fun categories. Only for Grit:lab students.">
  <title>Class Vote 🗳️ — Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-orbs">
    <div class="bg-orb-extra"></div>
  </div>

  <div class="page-container login-page">
    <div class="glass-card login-card">
      <div class="login-logo">🗳️</div>
      <h1 class="login-title">Class Vote</h1>
      <p class="login-subtitle">
        Vote for your classmates in fun categories.<br>
        Who's the most social? Most coder? Find out!
      </p>

      <button class="btn btn-google" id="google-sign-in-btn" onclick="signInWithGoogle()">
        <svg width="22" height="22" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="login-divider">only @gritlab.ax</div>

      <div class="login-error" id="login-error"></div>

      <p class="login-footer">
        Made with ❤️ for Grit:lab students
      </p>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/auth.js"></script>
  <script>
    // Check for error in URL params
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('error') === 'domain') {
        showLoginError('Only @gritlab.ax email addresses are allowed.');
      }

      // If already logged in, redirect to app
      const session = await getSession();
      if (session) {
        if (isAllowedEmail(session.user.email)) {
          window.location.href = '/app';
        } else {
          await _supabase.auth.signOut();
          showLoginError('Only @gritlab.ax email addresses are allowed.');
        }
      }

      // Listen for auth state changes (OAuth callback)
      initAuthListener();
    });
  </script>
</body>
</html>
