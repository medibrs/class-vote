<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vote for your classmates across 10 fun categories.">
  <title>Class Vote 🗳️ — Vote</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-orbs">
    <div class="bg-orb-extra"></div>
  </div>

  <div class="page-container">
    <!-- Navigation Bar -->
    <nav class="navbar">
      <a href="/app" class="navbar-brand">
        <span>🗳️</span> Class Vote
      </a>
      <ul class="navbar-nav">
        <li><a href="/app" class="active" id="nav-vote">🗳️ Vote</a></li>
        <li style="display:none;"><a href="/results" id="nav-results">🏆 Results</a></li>
        <li style="display:none;"><a href="/users" id="nav-users">👥 Users</a></li>
        <li style="display:none;"><a href="/admin" id="nav-admin">👑 Admins</a></li>
        <li><a href="/profile" id="nav-profile">👤 Profile</a></li>
      </ul>
      <div class="navbar-user">
        <span class="navbar-username" id="navbar-username"></span>
        <img class="navbar-avatar" id="navbar-avatar" src="./assets/default-avatar.svg" alt="Avatar">
        <button class="btn btn-sm btn-secondary" onclick="signOut()" id="sign-out-btn">Sign Out</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>🗳️ Cast Your Votes</h1>
        <p>Click on a category to vote for a classmate</p>
      </div>

      <!-- Deadline Banner -->
      <div class="deadline-banner open" id="deadline-display">
        ⏰ Loading deadline...
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="stat-voted">0</div>
          <div class="stat-label">Voted</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-remaining">10</div>
          <div class="stat-label">Remaining</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-classmates">0</div>
          <div class="stat-label">Classmates</div>
        </div>
      </div>

      <!-- Category Cards Grid -->
      <div class="categories-grid" id="categories-grid">
        <!-- Rendered by JS -->
        <div class="loading-container" style="grid-column: 1 / -1;">
          <div>
            <div class="spinner"></div>
            <div class="loading-text">Loading categories...</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Voting Modal (2 steps: pick person → add motivation) -->
  <div class="modal-overlay" id="vote-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-header-left">
          <button class="modal-back" onclick="goBackToNominees()" id="modal-back-btn" aria-label="Back" style="display:none;">←</button>
          <h2 id="modal-category-title">Category</h2>
        </div>
        <button class="modal-close" onclick="closeVoteModal()" id="modal-close-btn" aria-label="Close">✕</button>
      </div>

      <!-- Step 1: Pick a nominee -->
      <div id="modal-step-nominee">
        <div class="modal-search">
          <input
            type="text"
            id="modal-search-input"
            placeholder="Search classmates..."
            oninput="handleModalSearch(event)"
            autocomplete="off"
          >
        </div>
        <div class="modal-body" id="nominee-list">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Step 2: Add motivation -->
      <div id="modal-step-motivation" style="display:none;">
        <div class="motivation-header" id="motivation-header">
          <!-- Shows who you're voting for -->
        </div>
        <div class="modal-body" id="motivation-body">
          <div class="motivation-section">
            <p class="motivation-prompt">Why do they deserve this? 💬</p>

            <!-- Existing motivations to pick from -->
            <div class="motivation-existing" id="motivation-existing-list">
              <!-- Rendered by JS -->
            </div>

            <!-- Write your own -->
            <div class="motivation-write">
              <textarea
                id="motivation-input"
                class="form-input"
                placeholder="Write your own motivation..."
                maxlength="200"
                rows="3"
              ></textarea>
              <p class="form-hint"><span id="motivation-char-count">0</span>/200 characters</p>
            </div>
          </div>

          <div class="motivation-actions">
            <button class="btn btn-secondary" onclick="submitVoteWithMotivation(null)" id="skip-motivation-btn">
              Skip
            </button>
            <button class="btn btn-primary" onclick="submitVoteWithNewMotivation()" id="submit-motivation-btn">
              Vote ✨
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
