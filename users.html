<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin dashboard — view registered users.">
  <title>Class Vote 🗳️ — Users</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-orbs">
    <div class="bg-orb-extra"></div>
  </div>

  <div class="page-container">
    <!-- Navigation Bar -->
    <nav class="navbar">
      <a href="/app" class="navbar-brand">
        <span>🗳️</span> Class Vote
      </a>
      <ul class="navbar-nav">
        <li><a href="/app" id="nav-vote">🗳️ Vote</a></li>
        <li><a href="/results" id="nav-results">🏆 Results</a></li>
        <li><a href="/users" class="active" id="nav-users">👥 Users</a></li>
        <li><a href="/admin" id="nav-admin">👑 Admins</a></li>
        <li><a href="/profile" id="nav-profile">👤 Profile</a></li>
      </ul>
      <div class="navbar-user">
        <span class="navbar-username" id="navbar-username"></span>
        <img class="navbar-avatar" id="navbar-avatar" src="./assets/default-avatar.svg" alt="Avatar">
        <button class="btn btn-sm btn-secondary" onclick="signOut()" id="sign-out-btn">Sign Out</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>👥 Registered Users</h1>
        <p>View all classmates who have connected to the website</p>
      </div>

      <!-- Users Section -->
      <section class="admin-section">
        <div class="admin-section-header">
          <h2>👥 Classmates</h2>
          <span class="admin-section-count" id="user-count">0</span>
        </div>
        <div class="admin-user-list" id="user-list">
          <div class="loading-container">
            <div>
              <div class="spinner"></div>
              <div class="loading-text">Loading users...</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/users.js"></script>
</body>
</html>
